<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Location Tool</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #1e293b;
  color: white;
}

/* Location cards */
.locations {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  background: #1e293b;
  cursor: pointer;
  transition: 0.2s;
}

.card.active {
  background: #3b82f6;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.search-btn {
  background: #22c55e;
  color: white;
}

.back-btn {
  background: #334155;
  color: white;
  display: none;
}

/* Frame container */
.frame-container {
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
  display: none;
}

iframe {
  width: 100%;
  height: 70vh;
  border: none;
}

/* Mobile tối ưu thêm */
@media (max-width: 480px) {
  h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h2>🌍 SEO Location Search</h2>

  <input type="text" id="keyword" placeholder="Nhập từ khóa..." />

  <div class="locations">
    <div class="card active" onclick="setLocation('vn', this)">🇻🇳 VN</div>
    <div class="card" onclick="setLocation('br', this)">🇧🇷 BR</div>
    <div class="card" onclick="setLocation('id', this)">🇮🇩 ID</div>
  </div>

  <button class="search-btn" onclick="searchGoogle()">Search</button>
  <button class="back-btn" id="backBtn" onclick="goBack()">⬅️ Quay lại</button>

  <div class="frame-container" id="frameBox">
    <iframe id="resultFrame"></iframe>
  </div>

</div>

<script>
let currentLocation = "vn";

function setLocation(loc, el) {
  currentLocation = loc;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function searchGoogle() {
  const keyword = document.getElementById("keyword").value.trim();
  if (!keyword) return alert("Nhập từ khóa trước!");

  let hl = "en";
  if (currentLocation === "vn") hl = "vi";
  if (currentLocation === "br") hl = "pt";
  if (currentLocation === "id") hl = "id";

  const url = `https://www.google.com/search?q=${encodeURIComponent(keyword)}&gl=${currentLocation}&hl=${hl}`;

  const frame = document.getElementById("resultFrame");
  const frameBox = document.getElementById("frameBox");

  // show UI trước
  frameBox.style.display = "block";
  document.getElementById("backBtn").style.display = "block";

  // thử load iframe
  frame.src = url;

  // fallback nếu bị Google chặn iframe
  setTimeout(() => {
    try {
      if (!frame.contentWindow || frame.contentWindow.location.href === "about:blank") {
        window.open(url, "_blank");
      }
    } catch (e) {
      window.open(url, "_blank");
    }
  }, 1200);
}

function goBack() {
  document.getElementById("resultFrame").src = "";
  document.getElementById("frameBox").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
}

// Enter để search (rất tiện mobile)
document.getElementById("keyword").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchGoogle();
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Location Tool</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #1e293b;
  color: white;
}

.locations {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  background: #1e293b;
  cursor: pointer;
}

.card.active {
  background: #3b82f6;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.btn-main {
  background: #22c55e;
}

.btn-sub {
  background: #334155;
}
</style>
</head>

<body>

<div class="container">

  <h2>🌍 SEO Location Search</h2>

  <input type="text" id="keyword" placeholder="Nhập từ khóa..." />

  <div class="locations">
    <div class="card active" onclick="setLocation('vn','vi', this)">🇻🇳 VN</div>
    <div class="card" onclick="setLocation('br','pt-BR', this)">🇧🇷 BR</div>
    <div class="card" onclick="setLocation('id','id', this)">🇮🇩 ID</div>
  </div>

  <button class="btn-main" onclick="searchNewTab()">🔍 Mở tab mới</button>
  <button class="btn-sub" onclick="searchSameTab()">📱 Mở trong tab này</button>

</div>

<script>
let currentLocation = "vn";
let currentLang = "vi";

function setLocation(loc, lang, el) {
  currentLocation = loc;
  currentLang = lang;

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function buildUrl() {
  const keyword = document.getElementById("keyword").value.trim();

  if (!keyword) {
    alert("Nhập từ khóa trước!");
    return null;
  }

  return `https://www.google.com/search?q=${encodeURIComponent(keyword)}&gl=${currentLocation}&hl=${currentLang}&pws=0`;
}

// mở tab mới
function searchNewTab() {
  const url = buildUrl();
  if (!url) return;
  window.open(url, "_blank");
}

// mở cùng tab
function searchSameTab() {
  const url = buildUrl();
  if (!url) return;
  window.location.href = url;
}

// Enter để search
document.getElementById("keyword").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchNewTab();
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Location Tool</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #1e293b;
  color: white;
}

/* Location cards */
.locations {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  background: #1e293b;
  cursor: pointer;
  transition: 0.2s;
}

.card.active {
  background: #3b82f6;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.btn-main {
  background: #22c55e;
  color: white;
}

.btn-sub {
  background: #334155;
  color: white;
}

/* Mobile tweak */
@media (max-width: 480px) {
  h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h2>🌍 SEO Location Search</h2>

  <input type="text" id="keyword" placeholder="Nhập từ khóa..." />

  <div class="locations">
    <div class="card active" onclick="setLocation('vn', this)">🇻🇳 VN</div>
    <div class="card" onclick="setLocation('br', this)">🇧🇷 BR</div>
    <div class="card" onclick="setLocation('id', this)">🇮🇩 ID</div>
  </div>

  <button class="btn-main" onclick="searchNewTab()">🔍 Mở tab mới</button>
  <button class="btn-sub" onclick="searchSameTab()">📱 Mở trong tab này</button>

</div>

<script>
let currentLocation = "vn";

function setLocation(loc, el) {
  currentLocation = loc;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function buildUrl() {
  const keyword = document.getElementById("keyword").value.trim();

  if (!keyword) {
    alert("Nhập từ khóa trước!");
    return null;
  }

  let hl = "en";
  if (currentLocation === "vn") hl = "vi";
  if (currentLocation === "br") hl = "pt";
  if (currentLocation === "id") hl = "id";

  return `https://www.google.com/search?q=${encodeURIComponent(keyword)}&gl=${currentLocation}&hl=${hl}`;
}

// mở tab mới (khuyên dùng)
function searchNewTab() {
  const url = buildUrl();
  if (!url) return;
  window.open(url, "_blank");
}

// mở trong cùng tab
function searchSameTab() {
  const url = buildUrl();
  if (!url) return;
  window.location.href = url;
}

// Enter để search nhanh
document.getElementById("keyword").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchNewTab();
  }
});
</script>

</body>
</html>

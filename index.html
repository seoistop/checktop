<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Location Tool</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0f172a;
  color: white;
}

.container {
  padding: 16px;
}

h2 {
  text-align: center;
}

.input-box {
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.locations {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  background: #1e293b;
  cursor: pointer;
}

.card.active {
  background: #3b82f6;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

iframe {
  width: 100%;
  height: 70vh;
  border: none;
  margin-top: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌍 SEO Location Search</h2>

  <div class="input-box">
    <input type="text" id="keyword" placeholder="Nhập từ khóa..." />
  </div>

  <div class="locations">
    <div class="card active" onclick="setLocation('vn', this)">🇻🇳 VN</div>
    <div class="card" onclick="setLocation('br', this)">🇧🇷 BR</div>
    <div class="card" onclick="setLocation('id', this)">🇮🇩 ID</div>
  </div>

  <button onclick="searchGoogle()">Search</button>

  <iframe id="resultFrame"></iframe>
</div>

<script>
let currentLocation = "vn";

function setLocation(loc, el) {
  currentLocation = loc;

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function searchGoogle() {
  const keyword = document.getElementById("keyword").value;

  let hl = "en";
  if (currentLocation === "vn") hl = "vi";
  if (currentLocation === "br") hl = "pt";
  if (currentLocation === "id") hl = "id";

  const url = `https://www.google.com/search?q=${encodeURIComponent(keyword)}&gl=${currentLocation}&hl=${hl}`;

  // thử load iframe (sẽ bị chặn trên đa số trình duyệt)
  document.getElementById("resultFrame").src = url;

  // fallback nếu bị chặn → mở trong same tab
  setTimeout(() => {
    if (!document.getElementById("resultFrame").contentWindow.length) {
      window.location.href = url;
    }
  }, 1500);
}
</script>

</body>
</html>
